on: [push, pull_request]
name: Test
jobs:
  test:
    strategy:
      matrix:
        go-version: [1.25.x, 1.26.x]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
         path: './src/github.com/kevinburke/twilio-go'
    # The OpenAPI conformance tests (*_oai_test.go) check our structs against
    # Twilio's official spec. They skip when the spec is absent; checking it out
    # and pointing TWILIO_OAI_DIR at it makes them run. Pinned to a commit so CI
    # is deterministic; bump the ref to re-check against a newer spec.
    - name: Check out twilio-oai spec
      uses: actions/checkout@v6
      with:
        repository: twilio/twilio-oai
        ref: 1a9189c79a73781ddf45afcd0afd1f210742d68c
        sparse-checkout: spec/json
        path: './src/github.com/twilio/twilio-oai'
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache-dependency-path: |
          ./src/github.com/kevinburke/twilio-go/go.sum
    # staticcheck needs this for GOPATH
    - run: |
        echo "GOPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV
        echo "PATH=$GITHUB_WORKSPACE/bin:$PATH" >> $GITHUB_ENV
    - name: Download dependencies
      run: go get -t -v ./...
      working-directory: './src/github.com/kevinburke/twilio-go'
    - name: Run tests
      run: make ci
      working-directory: './src/github.com/kevinburke/twilio-go'
      env:
        STATICCHECK: go run honnef.co/go/tools/cmd/staticcheck@latest
        TWILIO_OAI_DIR: ${{ github.workspace }}/src/github.com/twilio/twilio-oai
